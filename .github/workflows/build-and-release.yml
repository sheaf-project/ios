name: Build and Release Dev IPA

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: write

env:
  XCODE_VERSION: '26.2'
  CONFIGURATION: 'Release'
  PROJECT: 'Sheaf.xcodeproj'

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build Watch app
        run: |
          xcodebuild \
            -project "${{ env.PROJECT }}" \
            -target "watchOS App" \
            -configuration "${{ env.CONFIGURATION }}" \
            -destination 'generic/platform=watchOS' \
            SYMROOT="$RUNNER_TEMP/Build" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGN_ENTITLEMENTS= \
            DEVELOPMENT_TEAM= \
            PROVISIONING_PROFILE_SPECIFIER= \
            ASSETCATALOG_COMPILER_APPICON_NAME= \
            VALIDATE_DEPENDENCIES=NO \
            build

      - name: Build Watch Widget Extension
        run: |
          xcodebuild \
            -project "${{ env.PROJECT }}" \
            -target watchOSWidgetExtension \
            -configuration "${{ env.CONFIGURATION }}" \
            -destination 'generic/platform=watchOS' \
            SYMROOT="$RUNNER_TEMP/Build" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGN_ENTITLEMENTS= \
            DEVELOPMENT_TEAM= \
            PROVISIONING_PROFILE_SPECIFIER= \
            ASSETCATALOG_COMPILER_APPICON_NAME= \
            SKIP_INSTALL=YES \
            VALIDATE_DEPENDENCIES=NO \
            build

      - name: Build iOS Widget Extension
        run: |
          xcodebuild \
            -project "${{ env.PROJECT }}" \
            -target iOSWidgetExtension \
            -configuration "${{ env.CONFIGURATION }}" \
            -destination 'generic/platform=iOS' \
            SYMROOT="$RUNNER_TEMP/Build" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGN_ENTITLEMENTS= \
            DEVELOPMENT_TEAM= \
            PROVISIONING_PROFILE_SPECIFIER= \
            ASSETCATALOG_COMPILER_APPICON_NAME= \
            SKIP_INSTALL=YES \
            VALIDATE_DEPENDENCIES=NO \
            build

      - name: Build iOS app
        run: |
          xcodebuild \
            -project "${{ env.PROJECT }}" \
            -target Sheaf \
            -configuration "${{ env.CONFIGURATION }}" \
            -destination 'generic/platform=iOS' \
            SYMROOT="$RUNNER_TEMP/Build" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGN_ENTITLEMENTS= \
            DEVELOPMENT_TEAM= \
            PROVISIONING_PROFILE_SPECIFIER= \
            ASSETCATALOG_COMPILER_APPICON_NAME= \
            SKIP_INSTALL=NO \
            VALIDATE_DEPENDENCIES=NO \
            build

      - name: Assemble app bundle
        run: |
          IOS_APP="$RUNNER_TEMP/Build/${{ env.CONFIGURATION }}-iphoneos/Sheaf.app"
          WATCH_APP="$RUNNER_TEMP/Build/${{ env.CONFIGURATION }}-watchos/watchOS App.app"
          WIDGET_EXT="$RUNNER_TEMP/Build/${{ env.CONFIGURATION }}-watchos/watchOSWidgetExtension.appex"

          # Embed widget extension into watch app
          mkdir -p "$WATCH_APP/PlugIns"
          cp -R "$WIDGET_EXT" "$WATCH_APP/PlugIns/"

          # Embed watch app into iOS app
          mkdir -p "$IOS_APP/Watch"
          cp -R "$WATCH_APP" "$IOS_APP/Watch/"

          echo "Final bundle structure:"
          find "$IOS_APP" -maxdepth 4 -type d

      - name: Create unsigned IPA
        id: create_ipa
        run: |
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -R "$RUNNER_TEMP/Build/${{ env.CONFIGURATION }}-iphoneos/Sheaf.app" "$RUNNER_TEMP/Payload/"

          cd "$RUNNER_TEMP"
          COMMIT_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          IPA_NAME="Sheaf-unsigned-$(date +%Y%m%d-%H%M%S)-${COMMIT_SHORT}.ipa"

          zip -r "$IPA_NAME" Payload

          echo "ipa_name=$IPA_NAME" >> "$GITHUB_OUTPUT"
          echo "ipa_path=$RUNNER_TEMP/$IPA_NAME" >> "$GITHUB_OUTPUT"
          ls -lh "$IPA_NAME"

      - name: Delete old release assets
        run: |
          gh release view dev --json assets --jq '.assets[].name' 2>/dev/null | while read -r name; do
            gh release delete-asset dev "$name" --yes
          done
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update dev release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: Development Build (Unsigned)
          prerelease: true
          make_latest: false
          body: |
            Automated development build from commit ${{ github.sha }}.

            Built from branch `${{ github.ref_name }}` on ${{ github.run_id }}.
          files: |
            ${{ steps.create_ipa.outputs.ipa_path }}

