name: Build and Release Dev IPA

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  XCODE_VERSION: '26.2'
  CONFIGURATION: 'Release'
  PROJECT: 'Sheaf.xcodeproj'

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build iOS app
        run: |
          xcodebuild \
            -project "${{ env.PROJECT }}" \
            -target Sheaf \
            -configuration "${{ env.CONFIGURATION }}" \
            -sdk iphoneos \
            -arch arm64 \
            SYMROOT="$RUNNER_TEMP/Build" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGN_ENTITLEMENTS= \
            DEVELOPMENT_TEAM= \
            PROVISIONING_PROFILE_SPECIFIER= \
            ASSETCATALOG_COMPILER_APPICON_NAME= \
            SKIP_INSTALL=NO \
            VALIDATE_DEPENDENCIES=NO \
            build

      - name: Build Watch app
        run: |
          xcodebuild \
            -project "${{ env.PROJECT }}" \
            -target "SheafWatch Watch App" \
            -configuration "${{ env.CONFIGURATION }}" \
            -sdk watchos \
            SYMROOT="$RUNNER_TEMP/Build" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGN_ENTITLEMENTS= \
            DEVELOPMENT_TEAM= \
            PROVISIONING_PROFILE_SPECIFIER= \
            ASSETCATALOG_COMPILER_APPICON_NAME= \
            VALIDATE_DEPENDENCIES=NO \
            build

      - name: Build Widget Extension
        run: |
          xcodebuild \
            -project "${{ env.PROJECT }}" \
            -target SheafWatchWidgetExtension \
            -configuration "${{ env.CONFIGURATION }}" \
            -sdk watchos \
            SYMROOT="$RUNNER_TEMP/Build" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGN_ENTITLEMENTS= \
            DEVELOPMENT_TEAM= \
            PROVISIONING_PROFILE_SPECIFIER= \
            ASSETCATALOG_COMPILER_APPICON_NAME= \
            SKIP_INSTALL=YES \
            VALIDATE_DEPENDENCIES=NO \
            build

      - name: Assemble app bundle
        run: |
          IOS_APP="$RUNNER_TEMP/Build/${{ env.CONFIGURATION }}-iphoneos/Sheaf.app"
          WATCH_APP="$RUNNER_TEMP/Build/${{ env.CONFIGURATION }}-watchos/SheafWatch Watch App.app"
          WIDGET_EXT="$RUNNER_TEMP/Build/${{ env.CONFIGURATION }}-watchos/SheafWatchWidgetExtension.appex"

          # Embed widget extension into watch app
          mkdir -p "$WATCH_APP/PlugIns"
          cp -R "$WIDGET_EXT" "$WATCH_APP/PlugIns/"

          # Embed watch app into iOS app
          mkdir -p "$IOS_APP/Watch"
          cp -R "$WATCH_APP" "$IOS_APP/Watch/"

          echo "Final bundle structure:"
          find "$IOS_APP" -maxdepth 4 -type d

      - name: Create unsigned IPA
        id: create_ipa
        run: |
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -R "$RUNNER_TEMP/Build/${{ env.CONFIGURATION }}-iphoneos/Sheaf.app" "$RUNNER_TEMP/Payload/"

          cd "$RUNNER_TEMP"
          COMMIT_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          IPA_NAME="Sheaf-unsigned-$(date +%Y%m%d-%H%M%S)-${COMMIT_SHORT}.ipa"

          zip -r "$IPA_NAME" Payload

          echo "ipa_name=$IPA_NAME" >> "$GITHUB_OUTPUT"
          echo "ipa_path=$RUNNER_TEMP/$IPA_NAME" >> "$GITHUB_OUTPUT"
          ls -lh "$IPA_NAME"

      - name: Delete existing dev release
        continue-on-error: true
        run: gh release delete dev --yes --cleanup-tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create dev release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: dev
          name: Development Build (Unsigned)
          body: |
            ## Latest Development Build (Unsigned)

            **This IPA is unsigned and must be signed before installation.**

            ### Build Information

            - **Commit**: `${{ github.sha }}`
            - **Branch**: `${{ github.ref_name }}`
            - **Workflow Run**: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - **Signing**: UNSIGNED - Must be signed by user

            ### Quick Installation

            **AltStore (Easiest)**
            1. Install [AltStore](https://altstore.io/) on your iPhone
            2. Download the `.ipa` file below
            3. Open in AltStore - it will sign and install automatically

            **Sideloadly**
            1. Download [Sideloadly](https://sideloadly.io/)
            2. Connect your iPhone via USB
            3. Drag the `.ipa` into Sideloadly and enter your Apple ID

            **SideStore**
            1. Install [SideStore](https://sidestore.io/)
            2. Import and install the IPA

            ### Notes

            - Free Apple IDs work (7-day validity, auto-refresh with AltStore)
            - Paid developer accounts get 1-year validity
            - After installing, trust the app in Settings > General > VPN & Device Management
            - Watch app and complications are included but require proper signing to function

            ---

            *Updated on each push to `${{ github.ref_name }}`*

            ```
            ${{ github.event.head_commit.message }}
            ```
          files: |
            ${{ steps.create_ipa.outputs.ipa_path }}
          draft: false
          prerelease: true
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: false
          make_latest: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unsigned-build-${{ github.run_number }}
          path: ${{ steps.create_ipa.outputs.ipa_path }}
          retention-days: 30

